name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Semantic Release → npm
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push CHANGELOG.md + version bump commit + git tag
      issues: write         # comment on closed issues
      pull-requests: write  # comment on merged PRs
      id-token: write       # npm provenance attestation

    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Authentication to npm uses OIDC (npm Trusted Publisher), not a token.
      # Requires the id-token: write permission above and npm >= 11.5.1.
      - name: Update npm (OIDC support)
        run: npm install -g npm@latest

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
